name: Build and Release IPK

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  PACKAGE_NAME: openwrt-xray
  OPENWRT_VERSION: 24.10.6
  CACHE_DIR: ~/cache

jobs:
  release:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk_url: https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - arch: aarch64_cortex-a53
            sdk_url: https://downloads.openwrt.org/releases/24.10.6/targets/mediatek/filogic/openwrt-sdk-24.10.6-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - arch: aarch64_cortex-a72
            sdk_url: https://downloads.openwrt.org/releases/24.10.6/targets/mvebu/cortexa72/openwrt-sdk-24.10.6-mvebu-cortexa72_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - arch: arm_cortex-a7_neon-vfpv4
            sdk_url: https://downloads.openwrt.org/releases/24.10.6/targets/bcm27xx/bcm2709/openwrt-sdk-24.10.6-bcm27xx-bcm2709_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst
          - arch: aarch64_generic
            sdk_url: https://downloads.openwrt.org/releases/24.10.6/targets/rockchip/armv8/openwrt-sdk-24.10.6-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev dos2unix \
          python3 python3-setuptools python3-pip python3-pyelftools \
          rsync unzip zlib1g-dev file wget curl zstd

      - name: Download and extract SDK
        run: |
          mkdir sdk && cd sdk
          SDK_FILE=$(basename ${{ matrix.sdk_url }})
          wget -q ${{ matrix.sdk_url }} || { echo "❌ Failed to download SDK"; exit 1; }
          tar --zstd -xf $SDK_FILE --strip-components=1

      - name: Setup feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          mkdir -p package
          rm -rf package/openwrt-xray || true
          ln -s $GITHUB_WORKSPACE package/openwrt-xray
          ./scripts/feeds install -a

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Build package
        run: |
          cd sdk
          make defconfig
          make package/${PACKAGE_NAME}/compile V=s

      - name: Collect IPK
        run: |
          echo "📦 Searching IPK..."
          ARCH_SUFFIX=${{ matrix.arch }}
          mkdir -p release_ipk
          for f in $(find sdk/bin/ -type f -name "openwrt-xray*.ipk"); do
            cp "$f" "release_ipk/$(basename $f .ipk)-${ARCH_SUFFIX}.ipk"
          done
          echo "📂 Result:"
          ls -lh release_ipk/*.ipk || (echo "❌ No iPK found" && exit 1)

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_ipk/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
