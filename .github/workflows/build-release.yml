name: Build and Release (OpenWrt 25.12 APK)

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  PACKAGE_NAME: xray-core
  OPENWRT_VERSION: 25.12.2

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk_url: https://downloads.openwrt.org/releases/25.12.2/targets/x86/64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3 python3-setuptools python3-pip \
          rsync unzip zlib1g-dev file wget curl zstd

      - name: Download and extract SDK
        run: |
          mkdir sdk && cd sdk

          wget -q ${{ matrix.sdk_url }}/sha256sums

          SDK_FILE=$(grep -E "openwrt-sdk-.*\.tar\.zst" sha256sums | awk '{print $2}')

          if [ -z "$SDK_FILE" ]; then
            echo "❌ SDK not found"
            cat sha256sums
            exit 1
          fi

          echo "✅ SDK: $SDK_FILE"

          wget -q ${{ matrix.sdk_url }}/$SDK_FILE

          tar --zstd -xf $SDK_FILE --strip-components=1

      - name: Feeds
        run: |
          cd sdk

          ./scripts/feeds update -a

          rm -rf feeds/packages/net/${PACKAGE_NAME} || true
          ln -s $GITHUB_WORKSPACE package/${PACKAGE_NAME}

          ./scripts/feeds install -a

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Build package
        run: |
          cd sdk
          make defconfig
          make package/${PACKAGE_NAME}/compile V=s

      - name: Collect APK
        run: |
          echo "📦 Searching APK..."
          find sdk/bin/ -type f -name "*.apk" -exec cp {} . \;

          echo "📂 Result:"
          ls -lh *.apk || (echo "❌ No APK found" && exit 1)

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.apk'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
