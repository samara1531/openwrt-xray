name: Build and Release (OpenWrt 25.12 APK)

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  PACKAGE_NAME: xray-core
  CACHE_DIR: ~/cache
  OPENWRT_VERSION: 25.12.2

jobs:
  build:
    name: ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk_url: https://downloads.openwrt.org/releases/25.12.2/targets/x86/64

          - arch: aarch64_cortex-a53
            sdk_url: https://downloads.openwrt.org/releases/25.12.2/targets/bcm27xx/bcm2710

          - arch: aarch64_cortex-a72
            sdk_url: https://downloads.openwrt.org/releases/25.12.2/targets/mvebu/cortexa72

          - arch: mips_24kc
            sdk_url: https://downloads.openwrt.org/releases/25.12.2/targets/ath79/generic

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3 python3-setuptools python3-pip \
          rsync unzip zlib1g-dev file wget curl

      - name: Prepare SDK
        run: |
          mkdir sdk
          cd sdk

          wget -q ${{ matrix.sdk_url }}/sha256sums
          SDK_FILE=$(grep "sdk" sha256sums | awk '{print $2}')

          wget -q ${{ matrix.sdk_url }}/$SDK_FILE
          tar -xf $SDK_FILE --strip-components=1

      - name: Feeds
        run: |
          cd sdk
          ./scripts/feeds update -a

          rm -rf feeds/packages/net/${PACKAGE_NAME} || true
          ln -s $GITHUB_WORKSPACE package/${PACKAGE_NAME}

          ./scripts/feeds install -a

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Build
        run: |
          cd sdk
          make defconfig
          make package/${PACKAGE_NAME}/compile V=s

      - name: Collect APK
        run: |
          echo "Searching APK..."
          find sdk/bin/ -type f -name "*.apk" -exec cp {} . \;

          echo "Found files:"
          ls -lh *.apk || echo "NO APK FOUND"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.apk'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
